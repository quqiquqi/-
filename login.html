<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 南京审计大学校园二手物品交易平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        accent: '#f97316',
                        neutral: '#f8fafc',
                        'neutral-dark': '#1e293b'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .form-input {
                @apply w-full px-4 py-3 rounded-md border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary transition-colors;
            }
            .btn-primary {
                @apply w-full bg-primary text-white py-3 rounded-md hover:bg-primary/90 transition-colors font-medium;
            }
            .btn-secondary {
                @apply w-full border border-primary text-primary py-3 rounded-md hover:bg-primary/10 transition-colors font-medium;
            }
        }
    </style>
</head>
<body class="bg-neutral min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <div class="text-center">
            <div class="flex justify-center items-center space-x-2 mb-4">
                <i class="fa fa-exchange text-primary text-3xl"></i>
                <h1 class="text-2xl font-bold text-neutral-dark">南审二手</h1>
            </div>
            <h2 class="mt-6 text-3xl font-extrabold text-neutral-dark">
                登录您的账户
            </h2>
            <p class="mt-2 text-sm text-secondary">
                或 <a href="register.html" class="font-medium text-primary hover:text-primary/80">创建新账户</a>
            </p>
        </div>

        <form class="mt-8 space-y-6" action="index.html" method="post">
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-neutral-dark mb-1">邮箱</label>
                    <input id="email" name="email" type="email" required class="form-input" placeholder="请输入您的邮箱">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-neutral-dark mb-1">密码</label>
                    <input id="password" name="password" type="password" required class="form-input" placeholder="请输入您的密码">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-secondary">
                        记住我
                    </label>
                </div>

                <div class="text-sm">
                    <a href="#" class="font-medium text-primary hover:text-primary/80">
                        忘记密码?
                    </a>
                </div>
            </div>

            <div>
                <button type="submit" class="btn-primary">
                    登录
                </button>
            </div>

            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-neutral text-secondary">
                        或使用
                    </span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button type="button" class="btn-secondary flex items-center justify-center">
                    <i class="fa fa-weixin mr-2"></i> 微信
                </button>
                <button type="button" class="btn-secondary flex items-center justify-center">
                    <i class="fa fa-qq mr-2"></i> QQ
                </button>
            </div>
        </form>
    </div>

    <script>
        // 登录表单提交处理
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            // 模拟登录成功
            alert('登录成功！');
            window.location.href = 'index.html';
        });

        // 社交登录按钮处理
        document.querySelectorAll('button[type="button"]').forEach(button => {
            button.addEventListener('click', function() {
                alert('社交登录功能开发中...');
            });
        });
    </script>
</body>
</html>
